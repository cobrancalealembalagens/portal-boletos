<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal de Boletos</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:0;
color:#333;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:#fff;
border-radius:10px;
padding:20px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,.08);
}

input,select{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:8px;
margin-top:5px;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
cursor:pointer;
background:#222;
color:#fff;
}

button:hover{
opacity:.9;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:12px;
}

.hidden{
display:none;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
font-size:14px;
}

.badge{
padding:4px 8px;
border-radius:6px;
font-size:12px;
}

.pendente{
background:#fff3cd;
}

.pago{
background:#d1e7dd;
}

.vencido{
background:#f8d7da;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="container">

<div id="tela-login">

<div style="max-width:400px;margin:60px auto;">

<div class="card">

<h2 style="margin-bottom:20px;">
Portal de Boletos
</h2>

<div id="msg-login"></div>

<div style="margin-bottom:12px;">
<label>Login</label>
<input id="inp-login" type="text">
</div>

<div style="margin-bottom:16px;">
<label>Senha</label>
<input id="inp-senha" type="password">
</div>

<button onclick="fazerLogin()" style="width:100%;">
Entrar
</button>

</div>

</div>

</div>

<div id="tela-admin" class="hidden">

<div class="header">

<div>
<h2>Painel Administrativo</h2>
<p id="lbl-admin"></p>
</div>

<button onclick="sair()">
Sair
</button>

</div>

<div class="card">

<div class="grid">

<div>
<label>NF</label>
<input id="fa-nf">
</div>

<div>
<label>Parcela</label>
<input id="fa-parcela">
</div>

<div>
<label>Status</label>

<select id="fa-status">
<option value="">Todos</option>
<option value="pendente">Pendente</option>
<option value="pago">Pago</option>
<option value="vencido">Vencido</option>
</select>

</div>

</div>

<div style="margin-top:14px;">
<button onclick="buscarBoletos('admin')">
Buscar
</button>
</div>

</div>

<div class="card">

<div id="result-admin">
Carregando...
</div>

</div>

</div>

<div id="tela-fornecedor" class="hidden">

<div class="header">

<div>
<h2>Meus Boletos</h2>
<p id="lbl-forn"></p>
</div>

<button onclick="sair()">
Sair
</button>

</div>

<div class="card">

<div class="grid">

<div>
<label>NF</label>
<input id="ff-nf">
</div>

<div>
<label>Parcela</label>
<input id="ff-parcela">
</div>

<div>
<label>Status</label>

<select id="ff-status">
<option value="">Todos</option>
<option value="pendente">Pendente</option>
<option value="pago">Pago</option>
<option value="vencido">Vencido</option>
</select>

</div>

</div>

<div style="margin-top:14px;">
<button onclick="buscarBoletos('fornecedor')">
Buscar
</button>
</div>

</div>

<div class="card">

<div id="result-fornecedor">
Carregando...
</div>

</div>

</div>

</div>

<script>

const API_URL =
'SUA_URL_DO_APPS_SCRIPT_AQUI';

let usuarioAtual = null;

async function api(params){

const url =
API_URL +
'?' +
new URLSearchParams(params);

const r =
await fetch(url);

return r.json();
}

async function fazerLogin(){

const login =
document
.getElementById('inp-login')
.value
.trim();

const senha =
document
.getElementById('inp-senha')
.value
.trim();

document
.getElementById('msg-login')
.innerHTML =
'Entrando...';

try{

const res =
await api({
action:'login',
login:login,
senha:senha
});

if(!res.ok){

document
.getElementById('msg-login')
.innerHTML =
res.erro;

return;
}

usuarioAtual =
res.usuario;

document
.getElementById('tela-login')
.classList
.add('hidden');

if(
usuarioAtual.role ==
'admin'
){

document
.getElementById('tela-admin')
.classList
.remove('hidden');

document
.getElementById('lbl-admin')
.innerHTML =
usuarioAtual.nome;

buscarBoletos('admin');

}else{

document
.getElementById('tela-fornecedor')
.classList
.remove('hidden');

document
.getElementById('lbl-forn')
.innerHTML =
usuarioAtual.nome;

buscarBoletos('fornecedor');
}

}catch(e){

document
.getElementById('msg-login')
.innerHTML =
'Erro ao conectar.';
}
}

function sair(){

usuarioAtual = null;

document
.getElementById('tela-login')
.classList
.remove('hidden');

document
.getElementById('tela-admin')
.classList
.add('hidden');

document
.getElementById('tela-fornecedor')
.classList
.add('hidden');
}

async function buscarBoletos(tipo){

const params = {
action:'boletos'
};

if(tipo=='admin'){

params.nf =
document
.getElementById('fa-nf')
.value;

params.parcela =
document
.getElementById('fa-parcela')
.value;

params.status =
document
.getElementById('fa-status')
.value;

}else{

params.cnpj =
usuarioAtual.cnpj;

params.nf =
document
.getElementById('ff-nf')
.value;

params.parcela =
document
.getElementById('ff-parcela')
.value;

params.status =
document
.getElementById('ff-status')
.value;
}

const res =
await api(params);

const boletos =
res.boletos || [];

const target =
tipo=='admin'
?'result-admin'
:'result-fornecedor';

if(!boletos.length){

document
.getElementById(target)
.innerHTML =
'Nenhum boleto encontrado';

return;
}

let html =
'<table>';

html +=
'<thead><tr>' +
'<th>NF</th>' +
'<th>Parcela</th>' +
'<th>Valor</th>' +
'<th>Vencimento</th>' +
'<th>Status</th>' +
'<th>PDF</th>' +
'</tr></thead>';

html += '<tbody>';

boletos.forEach(function(b){

let venc =
String(b.vencimento || '');

if(
/^\d{4}-\d{2}-\d{2}$/
.test(venc)
){

const p =
venc.split('-');

venc =
p[2]+'/'+p[1]+'/'+p[0];
}

html +=
'<tr>' +

'<td>'+b.nf+'</td>' +

'<td>'+b.parcela+'</td>' +

'<td>R$ '+
Number(b.valor)
.toLocaleString(
'pt-BR',
{
minimumFractionDigits:2
}
)+
'</td>' +

'<td>'+venc+'</td>' +

'<td>' +
'<span class="badge '+b.status+'">' +
b.status +
'</span>' +
'</td>' +

'<td>' +

(
b.downloadUrl
? '<a href="'+
b.downloadUrl+
'" target="_blank">' +
'<button>PDF</button>' +
'</a>'
: 'Sem PDF'
)

+

'</td>' +

'</tr>';
});

html +=
'</tbody></table>';

document
.getElementById(target)
.innerHTML =
html;
}

document
.getElementById('inp-senha')
.addEventListener(
'keypress',
function(e){

if(e.key=='Enter'){
fazerLogin();
}
});

</script>

</body>

</html>
